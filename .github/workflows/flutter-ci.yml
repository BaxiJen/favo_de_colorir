name: Flutter CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  analyze-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.6'
          channel: 'stable'
          cache: true

      - name: Create .env
        run: |
          echo "SUPABASE_URL=https://placeholder.supabase.co" > .env
          echo "SUPABASE_ANON_KEY=placeholder" >> .env

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze code
        run: flutter analyze --no-fatal-infos --no-fatal-warnings

      - name: Run tests
        run: flutter test

      - name: Build Web
        run: flutter build web

  build-android:
    runs-on: ubuntu-latest
    needs: analyze-and-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write  # Criar releases com APK
    defaults:
      run:
        working-directory: app

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.6'
          channel: 'stable'
          cache: true

      - name: Create .env (placeholder — defaults hardcoded no client)
        run: |
          echo "SUPABASE_URL=" > .env
          echo "SUPABASE_ANON_KEY=" >> .env

      - name: Install dependencies
        run: flutter pub get

      - name: Flutter doctor
        run: flutter doctor -v

      - name: Build APK
        run: flutter build apk --release --verbose 2>&1 | tail -200

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: favo-release-apk
          path: app/build/app/outputs/flutter-apk/app-release.apk

      - name: Read version from pubspec
        if: success()
        id: version
        working-directory: app
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | sed 's/version: //')
          SHORT_SHA=$(echo "$GITHUB_SHA" | cut -c1-7)
          TAG="v${VERSION}-build.${GITHUB_RUN_NUMBER}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "short_sha=$SHORT_SHA" >> $GITHUB_OUTPUT
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "Release tag: $TAG"

      - name: Create GitHub Release
        if: success()
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Favo ${{ steps.version.outputs.version }} (build ${{ github.run_number }})
          body: |
            Build automático a partir do commit [${{ steps.version.outputs.short_sha }}](https://github.com/${{ github.repository }}/commit/${{ github.sha }}).

            **Mudanças:** ${{ github.event.head_commit.message }}

            ### Instalação
            Baixe `app-release.apk` abaixo e instale no Android
            (precisa permitir "fontes desconhecidas" nas configurações).

            ### Config necessária no device
            Aluna abre o app, loga com credencial enviada pela Débora.
            Se for primeiro acesso via magic link, o email dispara a
            bridge `/functions/v1/auth-bridge` que abre o app
            automaticamente via deep link `favo://auth-callback`.
          prerelease: true
          files: app/build/app/outputs/flutter-apk/app-release.apk

      - name: Upload Gradle logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: gradle-logs
          path: |
            app/build/app/outputs/logs
            app/.dart_tool/flutter_build/**/*.log
